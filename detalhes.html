<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Pokémon</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS Customizado -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-danger sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1 fw-bold">
                <i class="bi bi-collection"></i> Pokédex
            </span>
        </div>
    </nav>

    <main class="container py-5">
        <!-- Botão Voltar -->
        <div class="mb-4">
            <a href="index.html" class="btn btn-outline-danger">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>

        <!-- Indicador de Carregamento -->
        <div id="loadingIndicator" class="text-center mb-4">
            <div class="spinner-border text-danger" role="status">
                <span class="visually-hidden">Carregando...</span>
            </div>
            <p class="text-muted mt-2">Carregando detalhes...</p>
        </div>

        <!-- Mensagem de Erro -->
        <div id="errorMessage" class="alert alert-danger d-none" role="alert">
            <strong>Erro!</strong> <span id="errorText"></span>
        </div>

        <!-- Conteúdo dos Detalhes -->
        <div id="detailsContainer" class="d-none">
            <div class="row">
                <!-- Imagem -->
                <div class="col-md-6 mb-4 d-flex justify-content-center align-items-center">
                    <img id="pokemonImage" src="" alt="Imagem do Pokémon" class="img-fluid pokemon-detail-image">
                </div>

                <!-- Informações -->
                <div class="col-md-6">
                    <h1 id="pokemonName" class="text-danger fw-bold mb-4"></h1>

                    <!-- Card de Informações -->
                    <div class="card border-danger mb-4">
                        <div class="card-body">
                            <h5 class="card-title text-danger fw-bold mb-3">Informações</h5>

                            <!-- ID -->
                            <div class="mb-3">
                                <label class="text-muted small">ID:</label>
                                <p id="pokemonId" class="fw-bold"></p>
                            </div>

                            <!-- Altura -->
                            <div class="mb-3">
                                <label class="text-muted small">Altura:</label>
                                <p id="pokemonHeight" class="fw-bold"></p>
                            </div>

                            <!-- Peso -->
                            <div class="mb-3">
                                <label class="text-muted small">Peso:</label>
                                <p id="pokemonWeight" class="fw-bold"></p>
                            </div>

                            <!-- Tipos -->
                            <div class="mb-0">
                                <label class="text-muted small">Tipos:</label>
                                <div id="pokemonTypes" class="mt-2">
                                    <!-- Types serão inseridos aqui -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Card de Estatísticas -->
                    <div class="card border-danger">
                        <div class="card-body">
                            <h5 class="card-title text-danger fw-bold mb-3">Estatísticas</h5>
                            <div id="pokemonStats">
                                <!-- Stats serão inseridos aqui -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p class="mb-0">&copy; 2024 Pokédex - Consumindo PokéAPI. Desenvolvido com HTML, CSS e JavaScript.</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Script de Favoritos (localStorage) -->
    <script src="js/favoritos.js"></script>
    <!-- Script Customizado -->
    <script src="js/detalhes.js"></script>
</body>
</html>

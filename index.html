<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex - Lista de Pokémons</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS Customizado -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-danger sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1 fw-bold">
                <i class="bi bi-collection"></i> Pokédex
            </span>
        </div>
    </nav>

    <main class="container py-5">
        <!-- Título -->
        <div class="mb-5">
            <h1 class="text-danger fw-bold mb-2">Listagem de Pokémons</h1>
            <p class="text-muted">Explore a lista completa de Pokémons da primeira geração</p>
        </div>

        <!-- Campo de Pesquisa -->
        <div class="mb-4">
            <div class="input-group input-group-lg">
                <span class="input-group-text bg-danger text-white border-danger">
                    <i class="bi bi-search"></i>
                </span>
                <input 
                    type="text" 
                    id="searchInput" 
                    class="form-control border-danger" 
                    placeholder="Pesquise por nome ou ID do pokémon..." 
                    autocomplete="off"
                >
                <button 
                    class="btn btn-danger" 
                    type="button" 
                    id="clearButton"
                    title="Limpar pesquisa"
                >
                    Limpar
                </button>
            </div>
            <small class="text-muted d-block mt-2">
                💡 Dica: Digite o nome (ex: "pikachu") ou o ID (ex: "25") para buscar
            </small>
        </div>

        <!-- Filtros: Todos / Favoritos -->
        <div class="mb-4">
            <div class="btn-group" role="group" aria-label="Filtros de exibição">
                <button id="filterAll" type="button" class="btn btn-sm btn-outline-danger active">Todos</button>
                <button id="filterFavoritos" type="button" class="btn btn-sm btn-outline-danger">Favoritos</button>
            </div>
        </div>

        <!-- Indicador de Carregamento -->
        <div id="loadingIndicator" class="text-center mb-4">
            <div class="spinner-border text-danger" role="status">
                <span class="visually-hidden">Carregando...</span>
            </div>
            <p class="text-muted mt-2">Carregando Pokémons...</p>
        </div>

        <!-- Mensagem de Erro -->
        <div id="errorMessage" class="alert alert-danger d-none" role="alert">
            <strong>Erro!</strong> <span id="errorText"></span>
        </div>

        <!-- Grid de Cards -->
        <div id="pokemonGrid" class="row g-4">
            <!-- Cards serão inseridos aqui via JavaScript -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p class="mb-0">&copy; 2024 Pokédex - Consumindo PokéAPI. Desenvolvido com HTML, CSS e JavaScript.</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Script de Favoritos (localStorage) -->
    <script src="js/favoritos.js"></script>
    <!-- Script Customizado -->
    <script src="js/script.js"></script>
</body>
</html>
